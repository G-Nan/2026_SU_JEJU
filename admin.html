<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>2026 청년 캠프 - 관리자</title>
  <meta name="theme-color" content="#f5f8fa" />

  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

    :root { --ink: #14324a; --muted: #647b8f; --bg: #f5f8fa; --brand: #1a7bd6; --surface: #ffffff; --border: rgba(20,50,74,0.08); --danger: #d64545; }
    * { box-sizing: border-box; font-family: "Pretendard", system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--bg); color: var(--ink); }
    .wrap { width: 100%; max-width: 920px; margin: 0 auto; padding: 28px 16px 80px; }
    .hero { margin-bottom: 18px; padding: 22px 20px; border-radius: 24px; background: linear-gradient(135deg, rgba(26,123,214,0.12), rgba(0,206,203,0.08)); border: 1px solid rgba(26,123,214,0.10); }
    .hero h1 { margin: 0 0 8px; font-size: 28px; font-weight: 900; color: #0f4b6a; }
    .hero p { margin: 0; color: #365569; font-size: 14px; line-height: 1.6; }
    .hero a { color: #0f4b6a; font-weight: 900; }
    .notice, .status { margin-bottom: 18px; padding: 14px 16px; border-radius: 16px; font-size: 13px; font-weight: 700; line-height: 1.6; }
    .notice { background: #fff4f4; border: 1px solid rgba(214,69,69,0.18); color: #a83838; }
    .status { background: #eef6fd; border: 1px solid rgba(26,123,214,0.14); color: #1b5f98; }
    .layout { display: grid; gap: 18px; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; box-shadow: 0 8px 30px rgba(20,50,74,0.03); padding: 20px; }
    .panel h2 { margin: 0 0 14px; font-size: 19px; color: #0f4b6a; }
    .field-grid, .inline { display: grid; gap: 12px; }
    label { display: block; font-size: 12px; font-weight: 900; color: var(--muted); margin-bottom: 6px; }
    input, select, textarea { width: 100%; border: 1px solid #dce4eb; border-radius: 14px; padding: 12px 14px; font-size: 14px; background: #fff; color: var(--ink); outline: none; }
    textarea { min-height: 120px; resize: vertical; line-height: 1.5; }
    input:focus, select:focus, textarea:focus { border-color: var(--brand); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .btn { border: none; border-radius: 14px; padding: 12px 16px; font-size: 14px; font-weight: 900; cursor: pointer; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-subtle { background: #eef2f6; color: #355063; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .list { display: grid; gap: 12px; }
    .card { border: 1px solid var(--border); border-radius: 18px; padding: 16px; background: #fbfdff; }
    .card-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .card-title { margin: 0 0 6px; font-size: 16px; font-weight: 900; color: #0f4b6a; }
    .card-meta { margin: 0; font-size: 12.5px; color: var(--muted); font-weight: 700; line-height: 1.5; }
    .card ul { margin: 12px 0 0; padding-left: 18px; color: #3b4d5e; }
    .card li { margin-bottom: 6px; line-height: 1.5; font-size: 14px; }
    .empty { color: var(--muted); font-size: 14px; font-weight: 700; }

    @media (min-width: 768px) {
      .wrap { padding: 40px 20px 100px; }
      .layout { grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr); align-items: start; }
      .inline.two { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Camp Admin</h1>
      <p>회의일지를 홈페이지에서 직접 수정하는 화면입니다. 저장되면 <a href="./log.html">log.html</a>에 바로 반영됩니다.</p>
    </section>

    <div class="notice">현재 Firebase 연결값만 넣으면 작동하게 맞춰두었습니다. 다만 지금 단계의 규칙은 기능 확인용으로 열어둘 가능성이 높아서, 관리자 전용 잠금은 다음 단계에서 따로 걸어야 합니다.</div>
    <div id="statusBox" class="status">Firebase 연결값을 기다리는 중입니다...</div>

    <section class="layout">
      <div class="panel">
        <h2 id="formTitle">새 일지 등록</h2>
        <form id="logForm">
          <div class="field-grid">
            <div class="inline two">
              <div>
                <label for="team">팀</label>
                <select id="team" required>
                  <option value="all">공통</option>
                  <option value="plan">기획팀</option>
                  <option value="exec">진행팀</option>
                </select>
              </div>
              <div>
                <label for="status">상태</label>
                <select id="status" required>
                  <option value="completed">완료</option>
                  <option value="upcoming">다음 목표</option>
                  <option value="planned">예정</option>
                </select>
              </div>
            </div>

            <div class="inline two">
              <div>
                <label for="sortOrder">정렬 순서</label>
                <input id="sortOrder" type="number" min="1" step="1" value="10" required />
              </div>
              <div>
                <label for="dateLabel">날짜 표시 문구</label>
                <input id="dateLabel" type="text" placeholder="예: 기획팀 2차 · 5월 중" required />
              </div>
            </div>

            <div>
              <label for="title">제목</label>
              <input id="title" type="text" placeholder="예: 세부 프로그램 기획" required />
            </div>

            <div>
              <label for="summaryLines">내용</label>
              <textarea id="summaryLines" placeholder="한 줄에 하나씩 입력하세요." required></textarea>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-primary" type="submit" id="saveBtn">저장하기</button>
            <button class="btn btn-subtle" type="button" id="resetBtn">새로 작성</button>
            <button class="btn btn-danger" type="button" id="deleteBtn" hidden>삭제</button>
          </div>
        </form>
      </div>

      <div class="panel">
        <h2>등록된 일지</h2>
        <div id="logList" class="list">
          <div class="empty">연결 대기 중...</div>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js'
    import { getDatabase, onValue, push, ref, remove, set } from 'https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js'

    const firebaseConfig = {
      apiKey: 'AIzaSyAEtRXvGspCZBhA0l95fp6xnF7ZVSbODdQ',
      authDomain: 'camp-su.firebaseapp.com',
      databaseURL: 'https://camp-su-default-rtdb.firebaseio.com',
      projectId: 'camp-su',
      storageBucket: 'camp-su.firebasestorage.app',
      messagingSenderId: '445858058251',
      appId: '1:445858058251:web:a5efb44ca35b0686c2370e'
    }

    const app = initializeApp(firebaseConfig)
    const db = getDatabase(app)
    const logsRef = ref(db, 'camp_logs')

    const statusBox = document.getElementById('statusBox')
    const logListEl = document.getElementById('logList')
    const logForm = document.getElementById('logForm')
    const formTitleEl = document.getElementById('formTitle')
    const saveBtn = document.getElementById('saveBtn')
    const resetBtn = document.getElementById('resetBtn')
    const deleteBtn = document.getElementById('deleteBtn')

    const fields = {
      team: document.getElementById('team'),
      status: document.getElementById('status'),
      sortOrder: document.getElementById('sortOrder'),
      dateLabel: document.getElementById('dateLabel'),
      title: document.getElementById('title'),
      summaryLines: document.getElementById('summaryLines')
    }

    let currentLogs = []
    let editingId = null

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text ?? ''
      return div.innerHTML
    }

    function setStatus(message, isError = false) {
      statusBox.textContent = message
      statusBox.style.background = isError ? '#fff4f4' : '#eef6fd'
      statusBox.style.borderColor = isError ? 'rgba(214,69,69,0.18)' : 'rgba(26,123,214,0.14)'
      statusBox.style.color = isError ? '#a83838' : '#1b5f98'
    }

    function normalizeSummaryLines(text) {
      return text.split('\n').map(item => item.trim()).filter(Boolean)
    }

    function sortLogs(items) {
      return [...items].sort((a, b) => {
        const orderDiff = Number(a.sort_order || 0) - Number(b.sort_order || 0)
        if (orderDiff !== 0) return orderDiff
        return String(a.created_at || '').localeCompare(String(b.created_at || ''))
      })
    }

    function resetForm() {
      editingId = null
      formTitleEl.textContent = '새 일지 등록'
      logForm.reset()
      fields.team.value = 'all'
      fields.status.value = 'completed'
      fields.sortOrder.value = currentLogs.length > 0 ? Math.max(...currentLogs.map(item => Number(item.sort_order || 0))) + 10 : 10
      deleteBtn.hidden = true
    }

    function fillForm(item) {
      editingId = item.id
      formTitleEl.textContent = '일지 수정'
      fields.team.value = item.team
      fields.status.value = item.status
      fields.sortOrder.value = item.sort_order
      fields.dateLabel.value = item.date_label
      fields.title.value = item.title
      fields.summaryLines.value = Array.isArray(item.summary_lines) ? item.summary_lines.join('\n') : ''
      deleteBtn.hidden = false
      window.scrollTo({ top: 0, behavior: 'smooth' })
    }

    function renderList() {
      if (currentLogs.length === 0) {
        logListEl.innerHTML = '<div class="empty">아직 등록된 일지가 없습니다.</div>'
        return
      }

      logListEl.innerHTML = currentLogs.map(item => `
        <article class="card">
          <div class="card-top">
            <div>
              <h3 class="card-title">${escapeHtml(item.title)}</h3>
              <p class="card-meta">${escapeHtml(item.date_label)}<br>${escapeHtml(item.team)} / ${escapeHtml(item.status)} / 순서 ${escapeHtml(String(item.sort_order ?? ''))}</p>
            </div>
            <button class="btn btn-subtle" type="button" data-edit-id="${escapeHtml(item.id)}">수정</button>
          </div>
          <ul>
            ${(Array.isArray(item.summary_lines) ? item.summary_lines : []).map(line => `<li>${escapeHtml(line)}</li>`).join('')}
          </ul>
        </article>
      `).join('')

      logListEl.querySelectorAll('[data-edit-id]').forEach(btn => {
        btn.addEventListener('click', () => {
          const item = currentLogs.find(log => log.id === btn.dataset.editId)
          if (item) fillForm(item)
        })
      })
    }

    async function saveLog(payload) {
      if (editingId) {
        await set(ref(db, `camp_logs/${editingId}`), payload)
      } else {
        await set(push(logsRef), payload)
      }
    }

    logForm.addEventListener('submit', async event => {
      event.preventDefault()
      const payload = {
        team: fields.team.value,
        status: fields.status.value,
        sort_order: Number(fields.sortOrder.value),
        date_label: fields.dateLabel.value.trim(),
        title: fields.title.value.trim(),
        summary_lines: normalizeSummaryLines(fields.summaryLines.value),
        created_at: editingId ? (currentLogs.find(item => item.id === editingId)?.created_at || new Date().toISOString()) : new Date().toISOString()
      }

      if (!payload.date_label || !payload.title || payload.summary_lines.length === 0) {
        setStatus('필수 항목을 모두 입력해 주세요.', true)
        return
      }

      saveBtn.disabled = true
      deleteBtn.disabled = true

      try {
        await saveLog(payload)
        setStatus(editingId ? '일지를 수정했습니다.' : '새 일지를 등록했습니다.')
        resetForm()
      } catch (error) {
        console.error(error)
        setStatus('저장하지 못했습니다. Firebase 규칙과 연결값을 확인해 주세요.', true)
      } finally {
        saveBtn.disabled = false
        deleteBtn.disabled = false
      }
    })

    resetBtn.addEventListener('click', () => {
      resetForm()
      setStatus('새 등록 모드로 전환했습니다.')
    })

    deleteBtn.addEventListener('click', async () => {
      if (!editingId) return

      deleteBtn.disabled = true
      saveBtn.disabled = true

      try {
        await remove(ref(db, `camp_logs/${editingId}`))
        setStatus('일지를 삭제했습니다.')
        resetForm()
      } catch (error) {
        console.error(error)
        setStatus('삭제하지 못했습니다. Firebase 규칙을 확인해 주세요.', true)
      } finally {
        deleteBtn.disabled = false
        saveBtn.disabled = false
      }
    })

    resetForm()

    try {
      onValue(logsRef, snapshot => {
        const data = snapshot.val()
        currentLogs = data ? sortLogs(Object.entries(data).map(([id, value]) => ({ id, ...value }))) : []
        renderList()
        if (!editingId) resetForm()
        setStatus('연결 완료. 저장하면 log.html에 바로 반영됩니다.')
      }, error => {
        console.error(error)
        logListEl.innerHTML = '<div class="empty">Firebase에서 일지를 불러오지 못했습니다.</div>'
        setStatus('연결 실패. Firebase 규칙과 databaseURL을 확인해 주세요.', true)
      })
    } catch (error) {
      console.error(error)
      setStatus('Firebase 초기화에 실패했습니다.', true)
      logListEl.innerHTML = '<div class="empty">Firebase 초기화에 실패했습니다.</div>'
    }
  </script>
</body>
</html>
