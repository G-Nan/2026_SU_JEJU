<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>2026 청년 캠프 - 의견 나누기</title>
  <meta name="theme-color" content="#f5f8fa" />

  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

    :root { --ink: #14324a; --muted: #647b8f; --bg: #f5f8fa; --brand: #1a7bd6; --brand-light: #e8f3fc; --surface: #ffffff; --radius: 24px; --border: rgba(20,50,74,0.08); }
    * { box-sizing: border-box; font-family: "Pretendard", system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body { margin: 0; padding: 0; color: var(--ink); background-color: var(--bg); max-width: 500px; margin: 0 auto; box-shadow: 0 0 40px rgba(0,0,0,0.05); min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
    .sub-top-slot { position: relative; width: 100%; min-height: 96px; }
    .sub-top { position: fixed; top: 0; left: 50%; transform: translateX(-50%) translateY(0); width: 100%; max-width: 500px; z-index: 100; padding: 14px 16px 12px; background: rgba(245, 248, 250, 0.82); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); transition: transform 0.28s ease, opacity 0.28s ease; }
    .sub-top.hide { transform: translateX(-50%) translateY(-120%); opacity: 0; }
    .sub-top-inner { padding: 12px 14px 14px; border-radius: 20px; background: rgba(255, 255, 255, 0.68); border: 1px solid rgba(255, 255, 255, 0.78); box-shadow: 0 8px 24px rgba(20, 50, 74, 0.05); }
    .sub-top-title { display: block; margin: 0 0 12px; text-align: center; font-size: 15px; font-weight: 900; color: #0f4b6a; text-decoration: none; letter-spacing: -0.3px; }
    .sub-nav { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .sub-nav-pill { display: inline-flex; align-items: center; justify-content: center; min-width: 68px; height: 34px; padding: 0 14px; border-radius: 999px; text-decoration: none; font-size: 13px; font-weight: 800; color: var(--muted); background: #eef2f6; transition: all 0.2s ease; }
    .sub-nav-pill.active { background: #ffffff; color: #0f4b6a; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06); }
    .page-header { padding: 24px 16px 0; margin-bottom: 16px; }
    .page-header h1 { margin: 0 0 8px; font-size: 26px; font-weight: 900; color: #0f4b6a; letter-spacing: -0.5px; }
    .page-header p { margin: 0; font-size: 14px; color: var(--muted); line-height: 1.6; }
    .feed-container { padding: 16px; display: flex; flex-direction: column; gap: 20px; }
    .post { background: var(--surface); border-radius: var(--radius); box-shadow: 0 4px 20px rgba(20,50,74,0.03); border: 1px solid var(--border); overflow: hidden; }
    .post-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
    .post-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; background: var(--brand-light); color: var(--brand); font-size: 11px; font-weight: 800; margin-bottom: 12px; }
    .post-title { margin: 0 0 6px; font-size: 18px; font-weight: 900; line-height: 1.4; color: #0f4b6a; word-break: keep-all; }
    .post-guide { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.5; }
    .examples { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .example-chip { padding: 5px 10px; border-radius: 999px; background: #f0f4f8; color: #5c7183; font-size: 11.5px; font-weight: 600; }
    .post-comments { padding: 0 20px; }
    .empty-state { padding: 30px 0; text-align: center; color: #a0b0c0; font-size: 13px; font-weight: 600; }
    .comment-item { display: flex; gap: 12px; padding: 16px 0; border-bottom: 1px solid #f4f7fa; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .comment-item:last-child { border-bottom: none; }
    .comment-avatar { width: 36px; height: 36px; border-radius: 50%; background: #eef2f6; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .comment-body { flex: 1; min-width: 0; }
    .comment-meta { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; gap: 8px; }
    .comment-author { font-size: 14px; font-weight: 800; color: var(--ink); }
    .comment-time { font-size: 11px; color: #a0b0c0; font-weight: 500; }
    .comment-text { font-size: 14.5px; color: #2c3e50; line-height: 1.5; white-space: pre-wrap; word-break: break-word; margin: 0; }
    .view-more-btn { width: 100%; background: none; border: none; padding: 14px 0; color: var(--muted); font-size: 13px; font-weight: 700; text-align: left; cursor: pointer; }
    .post-write { padding: 16px 20px; background: #fafcff; border-top: 1px solid var(--border); }
    .write-row { display: flex; gap: 8px; align-items: flex-start; }
    .input-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    input, textarea { width: 100%; border: 1px solid #dce4eb; border-radius: 12px; padding: 10px 14px; font-size: 14px; background: #fff; color: var(--ink); outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus { border-color: var(--brand); }
    input { height: 42px; font-weight: 700; }
    textarea { min-height: 42px; height: 42px; resize: none; overflow: hidden; line-height: 1.4; }
    .submit-btn { width: 42px; height: 42px; border-radius: 12px; background: var(--brand); color: #fff; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: transform 0.1s; }
    .submit-btn:active { transform: scale(0.95); }
    .submit-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .status-msg { margin-top: 8px; font-size: 11px; font-weight: 700; color: var(--brand); text-align: right; min-height: 14px; }
    .status-msg.is-muted { color: var(--muted); }
    .status-msg.is-success { color: #1f8b4c; }
    .status-msg.is-error { color: #d64545; }
    .empty-state.is-error { color: #d64545; }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .global-notice { margin: 12px 16px 0; padding: 12px 14px; border-radius: 16px; background: #fff4f4; border: 1px solid rgba(214, 69, 69, 0.18); color: #b23b3b; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .retry-btn { border: none; border-radius: 10px; background: #d64545; color: #fff; padding: 8px 12px; font-size: 12px; font-weight: 800; cursor: pointer; flex-shrink: 0; }
    .retry-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    @media (min-width: 768px) {
      body { max-width: 100%; box-shadow: none; }
      .sub-top { max-width: 100%; padding: 18px 0; background: transparent; border: none; backdrop-filter: none; -webkit-backdrop-filter: none; }
      .sub-top-inner { max-width: 1040px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.6); }
      .sub-top-title { margin: 0; font-size: 20px; }
      .sub-nav { gap: 12px; }
      .sub-nav-pill { font-size: 14px; padding: 0 18px; height: 38px; }
      .sub-nav-pill:hover { background: #e4eaf0; }
      .sub-nav-pill.active:hover { background: #ffffff; }
      .page-header { max-width: 800px; margin: 120px auto 40px; text-align: center; padding: 0 20px; }
      .page-header h1 { font-size: 34px; margin-bottom: 12px; }
      .page-header p { font-size: 16px; }
      .global-notice { max-width: 800px; margin: 0 auto 20px auto; }
      .feed-container { max-width: 800px; margin: 0 auto; padding: 0 20px 80px; gap: 32px; }
      .post { transition: transform 0.2s ease, box-shadow 0.2s ease; }
      .post:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(20,50,74,0.06); }
      .post-title { font-size: 20px; margin-bottom: 10px; }
      .post-guide { font-size: 14.5px; }
      .comment-text { font-size: 15px; }
      .comment-author { font-size: 15px; }
      .post-write { padding: 20px 24px; }
      input { font-size: 15px; height: 48px; }
      textarea { font-size: 15px; min-height: 48px; height: 48px; padding-top: 13px; }
      .submit-btn { width: 48px; height: 48px; }
    }
  </style>
</head>
<body>
  <div class="sub-top-slot">
    <header class="sub-top">
      <div class="sub-top-inner">
        <a href="./index.html" class="sub-top-title">2026 SU JEJU</a>
        <nav class="sub-nav">
          <a class="sub-nav-pill" href="./log.html">일지</a>
          <a class="sub-nav-pill" href="./history.html">기록</a>
          <a class="sub-nav-pill active" href="./opinions.html">의견</a>
        </nav>
      </div>
    </header>
  </div>

  <div class="page-header">
    <h1>Camp Opinions ✍🏻</h1>
    <p>작은 의견 하나도 캠프를 더 좋게 만듭니다.<br>편하게 생각을 남겨주세요.</p>
  </div>

  <div id="globalNotice"></div>
  <main class="feed-container" id="feed"></main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js'
    import { getDatabase, onValue, push, ref, set } from 'https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js'

    const firebaseConfig = {
      apiKey: 'AIzaSyAEtRXvGspCZBhA0l95fp6xnF7ZVSbODdQ',
      authDomain: 'camp-su.firebaseapp.com',
      databaseURL: 'https://camp-su-default-rtdb.firebaseio.com',
      projectId: 'camp-su',
      storageBucket: 'camp-su.firebasestorage.app',
      messagingSenderId: '445858058251',
      appId: '1:445858058251:web:a5efb44ca35b0686c2370e'
    }

    const DEFAULT_TOPICS = [
      { id: 'expect', title: '이번 캠프에서 가장 기대하는 것은?', guide: '이번 캠프에서 기대하는 한 가지를 편하게 적어주세요.', examples: ['더 가까워지는 시간', '깊은 나눔과 기도', '좋은 추억', '재충전'], sort_order: 10 },
      { id: 'program', title: '꼭 있었으면 하는 프로그램은?', guide: '프로그램, 시간, 분위기 모두 괜찮습니다.', examples: ['조별 나눔', '저녁 자유교제', '찬양과 기도회', '레크레이션'], sort_order: 20 },
      { id: 'less', title: '반대로 너무 많지 않았으면 하는 것은?', guide: '부담스럽거나 너무 빡빡하지 않았으면 하는 요소를 적어주세요.', examples: ['이동이 많은 일정', '긴 강의식 프로그램', '체력 소모가 큰 활동'], sort_order: 30 },
      { id: 'mood', title: '어떤 분위기의 일정이 좋나요?', guide: '자유롭고 여유로운지, 균형형인지, 꽉 찬 일정이 좋은지 적어주세요.', examples: ['여유롭고 쉼이 있는 일정', '균형 있는 일정', '프로그램이 풍성한 일정'], sort_order: 40 },
      { id: 'places', title: '제주에서 가보고 싶은 곳 / 해보고 싶은 것은?', guide: '관광지, 자연, 산책, 체험, 사진 스팟 모두 괜찮습니다.', examples: ['바닷가 산책', '오름', '예쁜 카페', '야경 보기'], sort_order: 50 },
      { id: 'food', title: '제주에서 먹고 싶은 음식이 있나요?', guide: '음식, 간식, 카페 메뉴 모두 괜찮습니다.', examples: ['흑돼지', '갈치조림', '고기국수', '카페 디저트'], sort_order: 60 },
      { id: 'care', title: '걱정되거나 배려가 필요한 점이 있나요?', guide: '편한 범위 안에서만 적어주세요.', examples: ['낯을 가리는 편', '체력이 약한 편', '늦게 합류할 수도 있음'], sort_order: 70 },
      { id: 'free', title: '자유 의견', guide: '위 질문 외에도 전하고 싶은 생각을 자유롭게 남겨주세요.', examples: ['행사형보다 자연스러운 흐름', '자유 시간이 있었으면 좋겠음'], sort_order: 80 }
    ]

    const app = initializeApp(firebaseConfig)
    const db = getDatabase(app)
    const commentsRef = ref(db, 'camp_topic_comments')
    const topicsRef = ref(db, 'camp_topics')

    const feedEl = document.getElementById('feed')
    const globalNoticeEl = document.getElementById('globalNotice')
    const nicknameStorageKey = 'camp_nickname'

    let topics = [...DEFAULT_TOPICS]
    let topicMap = Object.fromEntries(DEFAULT_TOPICS.map(topic => [topic.id, topic]))
    let allCommentsGrouped = {}
    let expandedTopics = new Set()

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text ?? ''
      return div.innerHTML
    }

    function showGlobalNotice(message, showRetry = false) {
      globalNoticeEl.className = 'global-notice'
      globalNoticeEl.innerHTML = `
        <span>${escapeHtml(message)}</span>
        ${showRetry ? '<button type="button" class="retry-btn" id="retryInitBtn">새로고침</button>' : ''}
      `
      if (showRetry) {
        const retryBtn = document.getElementById('retryInitBtn')
        if (retryBtn) retryBtn.addEventListener('click', () => window.location.reload())
      }
    }

    function clearGlobalNotice() {
      globalNoticeEl.className = ''
      globalNoticeEl.innerHTML = ''
    }

    function setStatus(topicId, message = '', type = '') {
      const el = document.getElementById(`status-${topicId}`)
      if (!el) return
      el.textContent = message
      el.className = 'status-msg' + (type ? ` is-${type}` : '')
    }

    function setStatusAll(message = '', type = '') {
      topics.forEach(topic => setStatus(topic.id, message, type))
    }

    function setSubmitButtonsDisabled(disabled) {
      document.querySelectorAll('.submit-btn').forEach(btn => { btn.disabled = disabled })
    }

    function setCommentsMessage(message, isError = false) {
      topics.forEach(topic => {
        const container = document.getElementById(`comments-${topic.id}`)
        if (!container) return
        container.innerHTML = `<div class="empty-state${isError ? ' is-error' : ''}">${escapeHtml(message)}</div>`
      })
    }

    function formatTime(isoString) {
      const d = new Date(isoString)
      const month = d.getMonth() + 1
      const date = d.getDate()
      const hours = String(d.getHours()).padStart(2, '0')
      const mins = String(d.getMinutes()).padStart(2, '0')
      return `${month}. ${date}. ${hours}:${mins}`
    }

    function getSavedNickname() {
      return localStorage.getItem(nicknameStorageKey) || ''
    }

    function setSavedNickname(name) {
      localStorage.setItem(nicknameStorageKey, name)
      document.querySelectorAll('.nickname-input').forEach(input => {
        if (document.activeElement !== input) input.value = name
      })
    }

    function normalizeTopic(rawId, value = {}) {
      const id = String(value.id || rawId || '').trim()
      return {
        id,
        title: String(value.title || '').trim(),
        guide: String(value.guide || '').trim(),
        examples: Array.isArray(value.examples) ? value.examples.map(item => String(item).trim()).filter(Boolean) : [],
        sort_order: Number(value.sort_order || 0)
      }
    }

    function ensureTopicState() {
      topicMap = Object.fromEntries(topics.map(topic => [topic.id, topic]))
      allCommentsGrouped = Object.fromEntries(topics.map(topic => [topic.id, allCommentsGrouped[topic.id] || []]))
    }

    window.toggleComments = function(topicId) {
      if (expandedTopics.has(topicId)) expandedTopics.delete(topicId)
      else expandedTopics.add(topicId)
      renderCommentsForTopic(topicId)
    }

    function renderFeed() {
      feedEl.innerHTML = topics.map((topic, index) => `
        <article class="post" id="post-${topic.id}">
          <div class="post-header">
            <div class="post-badge">Q${index + 1}</div>
            <h2 class="post-title">${escapeHtml(topic.title)}</h2>
            <p class="post-guide">${escapeHtml(topic.guide)}</p>
            <div class="examples">
              ${(topic.examples || []).map(ex => `<span class="example-chip">${escapeHtml(ex)}</span>`).join('')}
            </div>
          </div>
          <div class="post-comments" id="comments-${topic.id}">
            <div class="empty-state">로딩 중...</div>
          </div>
          <div class="post-write">
            <form class="topic-form" data-topic="${topic.id}">
              <div class="write-row">
                <div class="input-group">
                  <input class="nickname-input" type="text" maxlength="20" placeholder="닉네임 (예: 여름청년)" value="${escapeHtml(getSavedNickname())}" required />
                  <textarea class="content-input" maxlength="500" placeholder="자유롭게 의견을 남겨주세요" required oninput="this.style.height='';this.style.height=this.scrollHeight + 'px'"></textarea>
                </div>
                <button class="submit-btn" type="submit" aria-label="게시">
                  <svg viewBox="0 0 24 24"><path d="M22 2L11 13"></path><path d="M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                </button>
              </div>
              <div class="status-msg" id="status-${topic.id}"></div>
            </form>
          </div>
        </article>
      `).join('')
    }

    function renderCommentsForTopic(topicId) {
      const items = allCommentsGrouped[topicId] || []
      const container = document.getElementById(`comments-${topicId}`)
      if (!container) return

      if (items.length === 0) {
        container.innerHTML = '<div class="empty-state">아직 남겨진 의견이 없어요. 첫 번째로 의견을 남겨주세요! ✍️</div>'
        return
      }

      const isExpanded = expandedTopics.has(topicId)
      const displayItems = isExpanded ? items : items.slice(0, 3)
      const hiddenCount = items.length - displayItems.length

      let html = displayItems.map(item => {
        const seed = encodeURIComponent((item.nickname || '익명').trim() || '익명')
        const avatarUrl = `https://api.dicebear.com/7.x/fun-emoji/svg?seed=${seed}`
        return `
          <div class="comment-item">
            <div class="comment-avatar">
              <img src="${avatarUrl}" style="width:100%;height:100%;" alt="avatar" />
            </div>
            <div class="comment-body">
              <div class="comment-meta">
                <span class="comment-author">${escapeHtml(item.nickname)}</span>
                <span class="comment-time">${formatTime(item.created_at)}</span>
              </div>
              <p class="comment-text">${escapeHtml(item.content)}</p>
            </div>
          </div>
        `
      }).join('')

      if (hiddenCount > 0) html += `<button class="view-more-btn" onclick="toggleComments('${topicId}')">이전 의견 ${hiddenCount}개 더 보기 💬</button>`
      else if (isExpanded && items.length > 3) html += `<button class="view-more-btn" onclick="toggleComments('${topicId}')">댓글 접기 ᐱ</button>`

      container.innerHTML = html
    }

    function hydrateComments(data) {
      ensureTopicState()
      topics.forEach(topic => { allCommentsGrouped[topic.id] = [] })
      Object.values(data || {}).forEach(item => {
        if (item && topicMap[item.topic]) {
          allCommentsGrouped[item.topic].push(item)
        }
      })
      topics.forEach(topic => {
        allCommentsGrouped[topic.id].sort((a, b) => String(b.created_at || '').localeCompare(String(a.created_at || '')))
        renderCommentsForTopic(topic.id)
      })
    }

    feedEl.addEventListener('input', event => {
      if (event.target.classList.contains('nickname-input')) {
        setSavedNickname(event.target.value.trim())
      }
    })

    feedEl.addEventListener('submit', async event => {
      const form = event.target.closest('.topic-form')
      if (!form) return
      event.preventDefault()

      const topic = form.dataset.topic
      const nicknameInput = form.querySelector('.nickname-input')
      const contentInput = form.querySelector('.content-input')
      const btn = form.querySelector('.submit-btn')
      const nickname = nicknameInput.value.trim()
      const content = contentInput.value.trim()

      if (!nickname) {
        setStatus(topic, '닉네임을 입력해 주세요.', 'error')
        nicknameInput.focus()
        return
      }

      if (!content) {
        setStatus(topic, '내용을 입력해 주세요.', 'error')
        contentInput.focus()
        return
      }

      btn.disabled = true
      setStatus(topic, '등록 중...', 'muted')

      try {
        setSavedNickname(nickname)
        await set(push(commentsRef), {
          topic,
          nickname,
          content,
          created_at: new Date().toISOString()
        })
        contentInput.value = ''
        contentInput.style.height = '42px'
        expandedTopics.add(topic)
        setStatus(topic, '등록 완료!', 'success')
        setTimeout(() => setStatus(topic, ''), 2000)
      } catch (error) {
        console.error(error)
        setStatus(topic, '등록하지 못했습니다. 잠시 후 다시 시도해 주세요.', 'error')
      } finally {
        btn.disabled = false
      }
    })

    renderFeed()
    setSubmitButtonsDisabled(true)
    setCommentsMessage('의견을 불러오는 중입니다...')
    showGlobalNotice('질문과 의견을 연결하는 중입니다...')

    onValue(topicsRef, snapshot => {
      const data = snapshot.val()
      if (!data) {
        topics = [...DEFAULT_TOPICS]
      } else {
        const loadedTopics = Object.entries(data)
          .map(([key, value]) => normalizeTopic(key, value))
          .filter(topic => topic.id && topic.title)
          .sort((a, b) => a.sort_order - b.sort_order)
        topics = loadedTopics.length > 0 ? loadedTopics : [...DEFAULT_TOPICS]
      }

      ensureTopicState()
      renderFeed()
      hydrateComments({})
    }, error => {
      console.error(error)
      topics = [...DEFAULT_TOPICS]
      ensureTopicState()
      renderFeed()
      setCommentsMessage('질문을 불러오지 못했습니다. 기본 질문만 표시합니다.', true)
    })

    onValue(commentsRef, snapshot => {
      hydrateComments(snapshot.val() || {})
      clearGlobalNotice()
      setSubmitButtonsDisabled(false)
      setStatusAll('', '')
    }, error => {
      console.error(error)
      setSubmitButtonsDisabled(true)
      setStatusAll('연결에 실패했습니다.', 'error')
      setCommentsMessage('Firebase에서 의견을 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.', true)
      showGlobalNotice('의견 연결에 실패했습니다. 새로고침 후 다시 시도해 주세요.', true)
    })

    const subTop = document.querySelector('.sub-top')
    let lastScrollY = window.scrollY
    window.addEventListener('scroll', () => {
      if (!subTop) return
      const currentScrollY = window.scrollY
      if (currentScrollY <= 20) subTop.classList.remove('hide')
      else if (currentScrollY > lastScrollY && currentScrollY > 80) subTop.classList.add('hide')
      else subTop.classList.remove('hide')
      lastScrollY = currentScrollY
    }, { passive: true })
  </script>
</body>
</html>
